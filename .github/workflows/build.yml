name: Build firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e twatch-ultra

      - name: Rename artefacts
        run: |
          mkdir -p dist
          cp .pio/build/twatch-ultra/firmware.bin      dist/wdgwatch-firmware-${{ github.ref_name }}.bin
          cp .pio/build/twatch-ultra/firmware.elf      dist/wdgwatch-firmware-${{ github.ref_name }}.elf
          cp .pio/build/twatch-ultra/bootloader.bin    dist/wdgwatch-bootloader-${{ github.ref_name }}.bin
          cp .pio/build/twatch-ultra/partitions.bin    dist/wdgwatch-partitions-${{ github.ref_name }}.bin || true

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wdgwatch-firmware-${{ github.ref_name }}
          path: dist/
          retention-days: 30

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
