[platformio]
build_cache_dir = .pio/buildcache

[env:twatch-ultra]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = lilygo-t-watch-ultra
framework = arduino

; Board variant with pin definitions
board_build.variants_dir = variants

; Partition scheme
board_build.partitions = partitions.csv
board_build.filesystem = fatfs

; Upload
upload_speed = 115200
upload_port = /dev/ttyACM0
upload_flags = --no-stub
monitor_speed = 115200
monitor_port = /dev/ttyACM0

; Build flags
build_flags =
    -DARDUINO_T_WATCH_S3_ULTRA
    -DARDUINO_LILYGO_LORA_SX1262
    -DUSING_FATFS
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DRADIOLIB_EXCLUDE_RF69
    -DRADIOLIB_EXCLUDE_SX1231
    -DRADIOLIB_EXCLUDE_RFM2X
    -DRADIOLIB_EXCLUDE_SX127X
    -I src
    -I variants/lilygo_twatch_ultra
    -I .pio/libdeps/twatch-ultra/NFC-RFAL-fork/src
    -Os

; Dependencies (matching official LilyGoLib-PlatformIO versions)
lib_deps =
    Xinyuan-LilyGO/LilyGoLib
    jgromes/RadioLib@^7.4.0
    lvgl/lvgl@^9.4.0
    lewisxhe/XPowersLib@^0.3.1
    lewisxhe/SensorLib@^0.3.3
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/lewisxhe/ST25R3916-fork.git
    https://github.com/lewisxhe/NFC-RFAL-fork.git
    # BLE Keyboard/Mouse removed - replaced by NimBLE UART service
    https://github.com/tonhuisman/IRremoteESP8266.git
    # earlephilhower/ESP8266Audio@2.0.0 removed to resolve legacy I2S driver conflict
    h2zero/NimBLE-Arduino@^2.0.0
    ESP32Async/ESPAsyncWebServer
    bblanchon/ArduinoJson@^7.0.0

extra_scripts = 
    pre:tools/patch_80211.py
